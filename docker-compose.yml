x-app-environment: &app-environment
  APP_NAME: "Event-Driven Notification"
  APP_ENV: local
  APP_KEY: ""
  APP_DEBUG: "true"
  APP_URL: http://localhost:8080

  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: notification_db
  DB_USERNAME: laravel
  DB_PASSWORD: secret

  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379

  CACHE_STORE: redis
  QUEUE_CONNECTION: redis

  LOG_CHANNEL: stack
  LOG_LEVEL: debug

  WEBHOOK_SITE_UUID: "your-uuid-here"
  WEBHOOK_SITE_URL: https://webhook.site

  NOTIFICATION_RATE_LIMIT: 100
  NOTIFICATION_MAX_ATTEMPTS: 3
  NOTIFICATION_RETRY_BASE_DELAY: 30

x-app-volumes: &app-volumes
  - .:/var/www
  - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_app
    restart: unless-stopped
    working_dir: /var/www
    volumes: *app-volumes
    environment:
      <<: *app-environment
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notification_network

  nginx:
    image: nginx:1.25-alpine
    container_name: notification_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - notification_network

  mysql:
    image: mysql:8.0
    container_name: notification_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: notification_db
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    networks:
      - notification_network

  redis:
    image: redis:7-alpine
    container_name: notification_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./docker/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
    networks:
      - notification_network

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes: *app-volumes
    environment:
      <<: *app-environment
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notification_network

  adminer:
    image: adminer:latest
    container_name: notification_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - notification_network

networks:
  notification_network:
    driver: bridge
