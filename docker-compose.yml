services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=local
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notification_network

  nginx:
    image: nginx:1.25-alpine
    container_name: notification_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - notification_network

  mysql:
    image: mysql:8.0
    container_name: notification_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-notification_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-laravel}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    networks:
      - notification_network

  redis:
    image: redis:7-alpine
    container_name: notification_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
    networks:
      - notification_network

  queue_high:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_queue_high
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work redis --queue=high --sleep=1 --tries=3 --max-time=3600
    depends_on:
      - app
      - redis
      - mysql
    networks:
      - notification_network

  queue_default:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_queue_default
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work redis --queue=normal,low --sleep=3 --tries=3 --max-time=3600
    depends_on:
      - app
      - redis
      - mysql
    networks:
      - notification_network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan schedule:work
    depends_on:
      - app
      - redis
      - mysql
    networks:
      - notification_network

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_reverb
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8081:8080"
    depends_on:
      - app
    networks:
      - notification_network

networks:
  notification_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
