<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Test Client</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
        h1 { color: #00d4ff; margin-bottom: 5px; font-size: 1.4em; }
        .subtitle { color: #888; margin-bottom: 20px; font-size: 0.9em; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        input {
            background: #16213e; border: 1px solid #0f3460; color: #e0e0e0;
            padding: 8px 12px; font-family: monospace; font-size: 14px; width: 340px;
        }
        input::placeholder { color: #555; }
        button {
            padding: 8px 16px; font-family: monospace; font-size: 14px; cursor: pointer;
            border: none; color: #fff;
        }
        #subscribeBtn { background: #0f3460; }
        #subscribeBtn:hover { background: #1a5276; }
        #subscribeBtn.subscribed { background: #c0392b; }
        #clearBtn { background: #333; }
        #clearBtn:hover { background: #444; }
        .status { font-size: 12px; padding: 4px 8px; border-radius: 3px; }
        .status.connected { background: #1e8449; }
        .status.disconnected { background: #922b21; }
        .status.connecting { background: #7d6608; }
        #log {
            background: #0d1117; border: 1px solid #21262d; padding: 15px;
            height: calc(100vh - 160px); overflow-y: auto; font-size: 13px; line-height: 1.6;
        }
        .log-entry { border-bottom: 1px solid #161b22; padding: 6px 0; }
        .log-entry:last-child { border-bottom: none; }
        .log-time { color: #666; }
        .log-event { color: #58a6ff; font-weight: bold; }
        .log-status { font-weight: bold; }
        .log-status.delivered { color: #3fb950; }
        .log-status.queued, .log-status.processing { color: #d29922; }
        .log-status.failed, .log-status.permanently_failed { color: #f85149; }
        .log-status.retrying { color: #db6d28; }
        .log-status.cancelled { color: #8b949e; }
        .log-status.pending { color: #8b949e; }
        .log-system { color: #8b949e; font-style: italic; }
        .log-error { color: #f85149; }
        .log-json { color: #7ee787; margin-left: 20px; display: block; white-space: pre; }
    </style>
</head>
<body>
    <h1>WebSocket Test Client</h1>
    <p class="subtitle">Real-time notification status updates via Laravel Reverb</p>

    <div class="controls">
        <input type="text" id="notificationId" placeholder="Paste notification UUID here...">
        <button id="subscribeBtn" onclick="toggleSubscription()">Subscribe</button>
        <button id="clearBtn" onclick="clearLog()">Clear</button>
        <span id="connStatus" class="status disconnected">disconnected</span>
    </div>

    <div id="log"></div>

    <script>
        let pusher = null;
        let channel = null;
        let currentId = null;

        function initPusher() {
            if (pusher) return;

            updateStatus('connecting');
            logSystem('Connecting to ws://localhost:8085...');

            pusher = new Pusher('notification-key', {
                wsHost: 'localhost',
                wsPort: 8085,
                forceTLS: false,
                disableStats: true,
                enabledTransports: ['ws'],
                cluster: 'mt1'
            });

            pusher.connection.bind('connected', function () {
                updateStatus('connected');
                logSystem('Connected to Reverb WebSocket server');
            });

            pusher.connection.bind('disconnected', function () {
                updateStatus('disconnected');
                logSystem('Disconnected from server');
            });

            pusher.connection.bind('error', function (err) {
                updateStatus('disconnected');
                logError('Connection error: ' + (err.error ? err.error.data : JSON.stringify(err)));
            });
        }

        function toggleSubscription() {
            var btn = document.getElementById('subscribeBtn');

            if (channel) {
                unsubscribe();
                return;
            }

            var id = document.getElementById('notificationId').value.trim();
            if (!id) {
                logError('Please enter a notification ID');
                return;
            }

            initPusher();

            currentId = id;
            var channelName = 'notifications.' + id;

            logSystem('Subscribing to channel: ' + channelName);
            channel = pusher.subscribe(channelName);

            channel.bind('pusher:subscription_succeeded', function () {
                logSystem('Subscribed to ' + channelName + ' — waiting for events...');
                btn.textContent = 'Unsubscribe';
                btn.classList.add('subscribed');
            });

            channel.bind('pusher:subscription_error', function (err) {
                logError('Subscription failed: ' + JSON.stringify(err));
                channel = null;
            });

            channel.bind('notification.status.updated', function (data) {
                logEvent(data);
            });
        }

        function unsubscribe() {
            if (channel && pusher) {
                var channelName = 'notifications.' + currentId;
                pusher.unsubscribe(channelName);
                logSystem('Unsubscribed from ' + channelName);
            }
            channel = null;
            currentId = null;

            var btn = document.getElementById('subscribeBtn');
            btn.textContent = 'Subscribe';
            btn.classList.remove('subscribed');
        }

        function logEvent(data) {
            var log = document.getElementById('log');
            var time = new Date().toISOString().substr(11, 12);
            var statusClass = data.status || '';

            var entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML =
                '<span class="log-time">[' + time + ']</span> ' +
                '<span class="log-event">notification.status.updated</span> ' +
                '<span class="log-status ' + statusClass + '">' + (data.status || 'unknown') + '</span>' +
                '<span class="log-json">' + escapeHtml(JSON.stringify(data, null, 2)) + '</span>';

            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function logSystem(msg) {
            var log = document.getElementById('log');
            var time = new Date().toISOString().substr(11, 12);

            var entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = '<span class="log-time">[' + time + ']</span> <span class="log-system">' + escapeHtml(msg) + '</span>';

            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function logError(msg) {
            var log = document.getElementById('log');
            var time = new Date().toISOString().substr(11, 12);

            var entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = '<span class="log-time">[' + time + ']</span> <span class="log-error">ERROR: ' + escapeHtml(msg) + '</span>';

            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function updateStatus(state) {
            var el = document.getElementById('connStatus');
            el.className = 'status ' + state;
            el.textContent = state;
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // Allow Enter key to subscribe
        document.getElementById('notificationId').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') toggleSubscription();
        });
    </script>
</body>
</html>
